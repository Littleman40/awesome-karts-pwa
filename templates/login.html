{% extends "base.html" %}
{% block title %}Log In - Awesome Karts{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center px-6 py-24">
    <h1 class="text-3xl font-bold text-white mb-8">Log In</h1>
    <div class="bg-ak-card border border-ak-border rounded-xl p-8 w-full max-w-md">
        <form id="login-form" class="space-y-5" novalidate>
            <input type="hidden" data-next-url value="{{ request.args.get('next', '/dashboard') | e }}">
            <div>
                <label for="login-email" class="block text-white text-sm font-medium mb-1.5">Email</label>
                <input id="login-email" name="email" type="email" required autocomplete="email"
                       class="w-full bg-ak-border text-white placeholder-ak-hint text-sm rounded-lg px-4 py-2.5 border border-ak-border focus:outline-none focus:border-ak-purple transition-colors">
            </div>
            <div>
                <label for="login-password" class="block text-white text-sm font-medium mb-1.5">Password</label>
                <input id="login-password" name="password" type="password" required autocomplete="current-password"
                       class="w-full bg-ak-border text-white placeholder-ak-hint text-sm rounded-lg px-4 py-2.5 border border-ak-border focus:outline-none focus:border-ak-purple transition-colors">
            </div>

            <p data-form-error class="hidden text-sm text-red-400"></p>

            <button type="submit"
                    class="w-full bg-ak-purple hover:bg-purple-600 text-white font-medium text-sm py-3 rounded-lg transition-colors">
                Log In
            </button>

            <div class="text-center space-y-2">
                <p class="text-ak-muted text-sm">
                    Don't have an account?
                    <a href="/register" class="text-ak-purple hover:text-purple-400 underline">Register here</a>
                </p>
                <a href="#" class="block text-ak-muted text-sm hover:text-white underline transition-colors">Forgot password?</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
