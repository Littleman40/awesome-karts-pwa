{% extends "base.html" %}
{% block title %}Page Not Found - Awesome Karts{% endblock %}

    <div class="w-8 h-0.5 bg-ak-purple mb-6"></div>

    <h1 class="text-7xl font-extrabold text-white tracking-tight mb-4">ERROR 404</h1>

        Looks like you've taken a wrong turn. The page you're looking for doesn't exist or may have been moved.
    </p>

    <div class="flex items-center gap-3">
        <a href="/"
           class="inline-flex items-center gap-2 bg-ak-purple text-white font-semibold px-6 py-3 rounded-lg hover:bg-purple-600 transition-colors text-sm">
            Back to Home <span aria-hidden="true">→</span>
        </a>
        <a href="/bookings"
           class="inline-flex items-center gap-2 bg-ak-card border border-ak-border text-white font-semibold px-6 py-3 rounded-lg hover:border-ak-purple transition-colors text-sm">
            Book a Session
        </a>
    </div>

</section>
