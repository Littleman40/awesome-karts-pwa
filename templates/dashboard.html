{% extends "base.html" %}
{% block title %}Dashboard - Awesome Karts{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-6 py-12">
    <div class="w-8 h-0.5 bg-ak-purple mb-4"></div>
    <h1 class="text-4xl font-bold text-white mb-2">
        Welcome, {{ current_user.first_name }}
    </h1>
    <p class="text-ak-muted text-sm mb-10">You're logged in. The full dashboard is coming soon.</p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="bg-ak-card border border-ak-border rounded-xl p-6">
            <div class="w-6 h-0.5 bg-ak-purple mb-4"></div>
            <p class="text-white font-bold text-lg mb-1">Account</p>
            <p class="text-ak-muted text-sm">{{ current_user.email }}</p>
        </div>
        <div class="bg-ak-card border border-ak-border rounded-xl p-6 flex flex-col">
            <div class="w-6 h-0.5 bg-ak-purple mb-4"></div>
            <p class="text-white font-bold text-lg mb-1">Sign Out</p>
            <p class="text-ak-muted text-sm mb-4">End your session.</p>
            <button type="button" data-logout
                    class="mt-auto self-start bg-ak-purple hover:bg-purple-600 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
                Log Out
            </button>
        </div>
    </div>
</div>
{% endblock %}
